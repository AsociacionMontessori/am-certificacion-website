name: Validate Builds

on:
  push:
    branches:
      - main
      - chore/**
      - feat/**
      - fix/**
  pull_request:

concurrency:
  group: validate-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  website:
    name: Website Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

  alumnos-app:
    name: Alumnos App Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alumnos-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: alumnos-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build alumnos-app
        run: npm run build
